{{- if .Values.serviceMonitor.enabled }}
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "copilot-premium-exporter.fullname" . }}
  labels:
    {{- include "copilot-premium-exporter.labels" . | nindent 4 }}
    {{- with .Values.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "copilot-premium-exporter.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: metrics
      interval: {{ .Values.serviceMonitor.interval | default "60s" }}
      scrapeTimeout: {{ .Values.serviceMonitor.scrapeTimeout | default "30s" }}
      path: /metrics
{{- end }}

replicaCount: 1

image:
  repository: ""
  tag: latest
  pullPolicy: Always

githubToken: ""
existingSecret: ""

config:
  github_organizations: []
  github_enterprises: []
  exclude_skus: []
  cache_ttl_seconds: 900
  http_timeout_seconds: 30
  exporter_port: 9185
  exporter_host: "0.0.0.0"
  log_level: "INFO"
  api_version: "2022-11-28"
  elasticsearch_url: ""
  elasticsearch_index: "ds-copilot-billing"

elasticsearch:
  existingSecret: "elk-apikey"
  apiKeySecretKey: "ES_API_KEY"

service:
  type: ClusterIP
  port: 9185

serviceMonitor:
  enabled: false
  interval: 60s
  scrapeTimeout: 30s
  labels: {}

grafanaDashboard:
  enabled: false

kibanaDashboard:
  enabled: false

resources: {}

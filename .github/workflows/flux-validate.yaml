name: "Flux Validation"

on:
  workflow_call:
    secrets:
      GH_GENERIC_ACCOUNT_TOKEN:
        required: true

jobs:
  # 1) Discover cluster subdirectories so the matrix isn't hardcoded.
  discover-clusters:
    runs-on: ubuntu-latest
    outputs:
      clusters: ${{ steps.list.outputs.clusters }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: List cluster directories
        id: list
        run: |
          clusters=$(find clusters -mindepth 1 -maxdepth 1 -type d -printf '%f\n' \
            | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "clusters=$clusters" >> "$GITHUB_OUTPUT"

  # 2) Validate each cluster INDEPENDENTLY with a strict per-cluster --path.
  #    This is what stops the four clusters' identically-named Kustomizations
  #    (flux-system, infrastructure, aad-pod-identity, keda) from colliding.
  flux-local-test:
    needs: discover-clusters
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cluster: ${{ fromJSON(needs.discover-clusters.outputs.clusters) }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Flux CLI
        uses: fluxcd/flux2/action@v2.2.2

      - name: Rename this cluster's .sops.yaml (so flux-local ignores it)
        run: |
          find "clusters/${{ matrix.cluster }}" -name '.sops.yaml' \
            -exec mv {} {}_ \;

      - name: Validate ${{ matrix.cluster }}
        uses: allenporter/flux-local/action/test@7.8.0
        with:
          path: clusters/${{ matrix.cluster }}
          enable-helm: false
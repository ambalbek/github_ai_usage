name: "Flux Validation"

on:
  pull_request:
    paths:
      - "clusters/**"
      - "flux/**"
      - "helm/**"
      - ".github/workflows/flux-validate.yaml"
  push:
    branches: [main]
    paths:
      - "clusters/**"
      - "flux/**"
      - "helm/**"

permissions:
  contents: read

jobs:
  # ------------------------------------------------------------------
  # Fast feedback: does the Helm chart even render? Catches template
  # and values errors before flux-local spins up.
  # ------------------------------------------------------------------
  helm-lint:
    name: Lint & template the chart
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4
          token: ${{ github.token }}

      - name: helm lint
        run: |
          helm lint ./helm/copilot-premium-exporter \
            -f ./helm/copilot-premium-exporter/values-local.yaml

      - name: helm template (render must succeed)
        run: |
          helm template cpe ./helm/copilot-premium-exporter \
            -f ./helm/copilot-premium-exporter/values-local.yaml > /dev/null

  # ------------------------------------------------------------------
  # flux-local: build every Flux Kustomization under clusters/ and
  # render the HelmReleases it references.
  # ------------------------------------------------------------------
  flux-local-validate:
    name: Validate all clusters
    runs-on: ubuntu-latest
    needs: helm-lint
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup Flux CLI
        uses: fluxcd/flux2/action@v2.2.2

      - name: Validate all clusters
        uses: allenporter/flux-local/action/test@7.8.0
        with:
          path: clusters
          enable-helm: true

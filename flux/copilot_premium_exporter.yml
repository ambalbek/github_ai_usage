apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: copilot-premium-exporter
  namespace: monitoring
spec:
  interval: 10m
  timeout: 5m
  releaseName: copilot-premium-exporter
  chart:
    spec:
      chart: helm/copilot-premium-exporter
      sourceRef:
        kind: GitRepository
        name: copilot-premium-exporter
        namespace: flux-system
      interval: 5m
  values:
    image:
      repository: YOUR_ACR_NAME.azurecr.io/copilot-premium-exporter
      tag: latest
      pullPolicy: IfNotPresent

    # Use externally managed secret for GITHUB_TOKEN
    existingSecret: "GITHUB_TOKEN"

    config:
      github_organizations:
        - "your-org-1"
      github_enterprises: []
      exclude_skus:
        - "Copilot Business"
        - "Copilot Enterprise"
      cache_ttl_seconds: 900
      http_timeout_seconds: 30
      exporter_port: 9185
      exporter_host: "0.0.0.0"
      log_level: "INFO"
      api_version: "2022-11-28"

    serviceMonitor:
      enabled: true
      interval: 60s
      scrapeTimeout: 30s
      additionalLabels: {}

    # --- Corporate Grafana integration ---
    # sidecarLabel MUST match your Grafana sidecar's LABEL_SELECTOR env var
    # Find yours: kubectl get deploy -l app.kubernetes.io/name=grafana -A -o yaml | grep LABEL
    grafanaDashboard:
      enabled: true
      sidecarLabel: grafana_dashboard
      sidecarLabelValue: "1"

    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

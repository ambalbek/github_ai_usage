apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: copilot-premium-exporter
  namespace: monitoring
spec:
  interval: 10m
  timeout: 15m
  install:
    disableWait: true
  upgrade:
    disableWait: true
    force: true
  releaseName: copilot-premium-exporter
  chart:
    spec:
      chart: helm
      sourceRef:
        kind: GitRepository
        name: copilot-premium-exporter
        namespace: flux-system
      interval: 5m
  values:
    image:
      repository: ghcr.io/<owner>/copilot-premium-exporter
      tag: main  # {"$imagepolicy": "flux-system:copilot-premium-exporter:tag"}
      pullPolicy: Always

    # Use externally managed secret for GITHUB_TOKEN
    existingSecret: "github-token"

    imagePullSecrets:
      - name: ghcr-secret

    config:
      github_organizations:
        - "your-org-1"
      github_enterprises: []
      exclude_skus:
        - "Copilot Business"
        - "Copilot Enterprise"
      cache_ttl_seconds: 900
      http_timeout_seconds: 30
      exporter_port: 9185
      exporter_host: "0.0.0.0"
      log_level: "INFO"
      api_version: "2022-11-28"
      elasticsearch_url: ""
      elasticsearch_index: "ds-copilot-billing"

    elasticsearch:
      existingSecret: "elk-apikey"
      apiKeySecretKey: "ES_API_KEY"

    serviceMonitor:
      enabled: true
      interval: 60s
      scrapeTimeout: 30s
      labels: {}

    grafanaDashboard:
      enabled: true

    kibanaDashboard:
      enabled: false

    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

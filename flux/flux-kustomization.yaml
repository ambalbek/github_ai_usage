apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: copilot-premium-exporter
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: copilot-premium-exporter
  path: ./flux
  prune: true
  decryption:
    provider: sops
    secretRef:
      name: sops-azure-kv
